{% extends "base.html" %}

{% block content %}

<div class="auth-container">


    <div class="auth-card">



        <h2>Welcome Back 😊</h2>



        <p class="sub-text">
            Login to access your account
        </p>




        {% if error %}

        <p style="color:red;">
            {{ error }}
        </p>

        {% endif %}




        <form action="{{ url_for('login') }}" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required
            >

             <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">Login</button>

        </form>


        <div class="auth-links">

            <a href="/forgot-password">
                Forgot Password?
            </a>

        </div>





        <p class="switch-auth">

            Don't have an account?

            <a href="/signup">
                Sign Up
            </a>

        </p>




    </div>


</div>


{% endblock %}
