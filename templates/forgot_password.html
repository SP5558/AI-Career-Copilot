{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">


        <h2>Forgot Password</h2>


        <p class="sub-text">
            Enter your registered email address and we will send you an OTP.
        </p>



        {% if error %}

        <p style="color:red;">
            {{ error }}
        </p>

        {% endif %}



        {% if success %}

        <p style="color:green;">
            {{ success }}
        </p>

        {% endif %}




        <form method="POST">


            <input
                type="email"
                name="email"
                placeholder="Enter your registered email"
                required
            >



            <button type="submit">
                Send OTP
            </button>


        </form>



        <br>


        <a href="/login">
            Back to Login
        </a>


    </div>

</div>


{% endblock %}
